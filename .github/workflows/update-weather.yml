# Place this file at: .github/workflows/update-weather.yml
#
# Fetches fresh METAR/TAF/SIGMET data every 30 minutes and commits it as
# data.json, which index.html reads on every page load (no CORS issues
# since it's same-origin on GitHub Pages).

name: Update weather data

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes, UTC
  workflow_dispatch: {}       # lets you trigger it manually from the Actions tab

permissions:
  contents: write

concurrency:
  group: update-weather
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch weather data
        run: python3 scripts/fetch_weather.py

      - name: Commit data.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Update weather data [skip ci]"
          git push
